<!DOCTYPE html>
<html>
<head>
    <title>FitZone Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🏋️ FitZone</h2>
    <a href="#">Dashboard</a>
    <a href="#">Members</a>
    <a href="#">Plans</a>
</div>

<!-- MAIN -->
<div class="main fade-in">

    <h1>FitZone Dashboard</h1>

    <div class="stats">
        <div class="card">
            <h2>{{ total_members }}</h2>
            <p>Total Members</p>
        </div>

        <div class="card">
            <h2>{{ active_members }}</h2>
            <p>Active Members</p>
        </div>
    </div>

    <div class="card">
        <h3>Add Member</h3>
        <form method="POST">
            <input name="name" placeholder="Name" required>
            <input name="age" placeholder="Age" required>
            <input name="plan" placeholder="Plan" required>
            <button>Add Member</button>
        </form>
    </div>

    <div class="card">
        <h3>Members List</h3>
        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Plan</th>
            </tr>

            {% for m in members %}
            <tr>
                <td>{{ m.name }}</td>
                <td>{{ m.age }}</td>
                <td>{{ m.plan }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
