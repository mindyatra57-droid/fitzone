<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Member</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            width:320px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
        }

        button{
            margin-top:15px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#00c896;
            color:white;
            cursor:pointer;
            font-size:16px;
        }
    </style>

</head>
<body>

<div class="box">

    <h2>Edit Member</h2>

    <form method="POST">

        <input type="text" name="name" value="{{ member[1] }}" required>

        <input type="text" name="age" value="{{ member[2] }}" required>

        <input type="text" name="plan" value="{{ member[3] }}" required>

        <button type="submit">Update Member</button>

    </form>

</div>

</body>
</html>
