<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .login-box{
            background:#1e293b;
            padding:40px;
            border-radius:15px;
            width:320px;
        }

        h2{
            color:white;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#00c896;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
