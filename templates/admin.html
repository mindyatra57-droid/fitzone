<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- TOPBAR -->
    <div class="topbar">
        <h2>👑 Admin Panel</h2>
        <a href="/logout"><button>Logout</button></a>
    </div>

    <!-- CARD -->
    <div class="card">
        <h3>All Members (All Users)</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Plan</th>
                    <th>User ID</th>
                </tr>
            </thead>

            <tbody>
                {% for m in members %}
                <tr>
                    <td>{{ m.id }}</td>
                    <td>{{ m.name }}</td>
                    <td>{{ m.age }}</td>
                    <td>{{ m.plan }}</td>
                    <td>{{ m.user_id }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
